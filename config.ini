# Maximum number of concurrent TCP connections.
max_connections = 100

# TTL eviction daemon sampling interval in milliseconds.
# Lower values evict expired keys faster at the cost of more CPU usage.
hz = 100

# Enable AOF persistence. When set to yes, every write command is appended to
# the AOF file so the dataset can be reconstructed on restart.
appendonly = no

# Name of the AOF file written inside appenddirname.
appendfilename = appendonly.aof

# Directory where the AOF file is stored.
appenddirname = appendonlydir

# Controls how often the AOF file is fsynced to disk.
#   always   — fsync after every write command (safest, slowest)
#   everysec — fsync once per second (default; at most 1 second of data loss)
#   no       — let the OS decide when to flush (fastest, ~30 seconds of potential loss)
appendfsync = everysec
